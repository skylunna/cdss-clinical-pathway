services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cdss-postgres
    environment:
      POSTGRES_DB: cdss_db
      POSTGRES_USER: cdss_user
      POSTGRES_PASSWORD: cdss_pass
    ports:
      - "5432:5432"
    volumes:
      - cdss_postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdss_user -d cdss_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cdss_postgres_data: